name: tabib
description: "Tabib - medical appointment platform for patients, doctors, and secretaries."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.6.2
  shared_preferences: ^2.2.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  intl: ^0.19.0
  uuid: ^4.5.1
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.10
  file_picker: ^8.3.2
  image: ^4.5.4
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  printing: ^5.14.3
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
