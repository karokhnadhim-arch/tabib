<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tabib — پلاتفۆرمی نۆرینگەی پزیشکی">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Tabib">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Tabib</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #1E88E5, #1565C0, #2E7D32);
      font-family: system-ui, sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
      text-align: center;
      padding: 24px;
    }
    #loading h1 { font-size: 2rem; margin: 16px 0 8px; }
    #loading p { opacity: 0.9; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h1>Tabib</h1>
    <p>پلاتفۆرمی نۆرینگەی پزیشکی</p>
    <p style="font-size:14px;margin-top:24px">بارکردن... ئەگەر زۆر درێژ بوو، server چالاک بکە (run_tabib.bat)</p>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
